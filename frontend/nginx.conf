server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service on the compose network.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # The AI draft endpoint calls Gemini with file attachments and can
        # legitimately take 30 s+. Default nginx proxy timeout is 60 s so
        # increase read timeout to avoid premature 502s on large assignments.
        proxy_read_timeout   90s;
        proxy_send_timeout   90s;
        proxy_connect_timeout 10s;
    }
}
